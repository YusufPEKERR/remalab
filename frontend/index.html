<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RemaLab WMS</title>
  </head>
  <body>
    <div id="root">
      <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #0f1219; }
        .splash-container {
          display: flex; flex-direction: column; align-items: center; justify-content: center;
          height: 100vh; width: 100vw; font-family: system-ui, -apple-system, sans-serif;
        }
        .splash-logo {
          width: 120px; height: 120px; object-fit: contain; margin-bottom: 24px;
          animation: pulse 2s ease-in-out infinite;
        }
        .splash-title {
          font-size: 24px; font-weight: bold; margin: 0 0 8px 0; color: #f1f5f9;
        }
        .splash-text {
          font-size: 15px; color: #94a3b8;
        }
        .splash-spinner {
          margin-top: 32px; width: 36px; height: 36px;
          border: 3px solid rgba(59, 130, 246, 0.2); border-top-color: #3b82f6;
          border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes pulse {
          0% { transform: scale(0.95); opacity: 0.8; }
          50% { transform: scale(1.05); opacity: 1; }
          100% { transform: scale(0.95); opacity: 0.8; }
        }
        @keyframes spin { to { transform: rotate(360deg); } }
      </style>
      <div class="splash-container">
        <img src="/src/assets/Uygulama-Amblemi.png" class="splash-logo" alt="RemaLab" />
        <h1 class="splash-title">RemaLab WMS</h1>
        <p class="splash-text">Uygulama Başlatılıyor, lütfen bekleyin...</p>
        <div class="splash-spinner"></div>
      </div>
    </div>
    <script src="/qwebchannel.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
